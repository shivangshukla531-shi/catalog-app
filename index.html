    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    
    :root {
        --bg-primary: #fafafa;
        --bg-card: #ffffff;
        --text-primary: #0a0a0a;
        --text-secondary: #6b6b6b;
        --border-color: #e8e8e8;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);

        --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);

        --radius: 16px;
        --spacing: 20px;
    }
    
    body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.5;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }
    
    .app {
        min-height: 100vh;
        padding-bottom: 40px;
    }
    
    .header {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.9);
    }
    
    .header-content {
        padding: 16px var(--spacing);
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .back-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
        margin: -8px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        transition: transform 0.2s;
    }
    
    .back-btn:active {
        transform: scale(0.9);
    }
    
    .header-title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
    }
    
    .container {
        padding: var(--spacing);
    }
    
    .category-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        margin-bottom: 20px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }
    
    .category-card:active {
        transform: scale(0.98);
        box-shadow: var(--shadow-sm);
    }
    
    .category-card-image {
        width: 100%;
        height: 200px;
        background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 72px;
        position: relative;
        overflow: hidden;
    }
    
    .category-card-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3) 0%, transparent 60%);
    }
    
    .category-card-title {
        padding: 24px;
        font-size: 24px;
        font-weight: 600;
        text-align: center;
        letter-spacing: -0.02em;
    }
    
    .brand-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
    }
    
    .brand-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 32px 24px;
        box-shadow: var(--shadow-md);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        border: 2px solid transparent;
    }
    
    .brand-card:active {
        transform: translateY(2px);
        box-shadow: var(--shadow-sm);
    }
    
    .brand-name {
        font-size: 20px;

    }
    
    .add-card {

        box-shadow: var(--shadow-sm);

        color: var(--text-secondary);
    }
    
    .add-card:active {

    }
    
    .add-icon {

    .add-text {
        font-size: 16px;
        font-weight: 500;
    }
    
    .product-grid {
        display: grid;

        gap: 16px;
    }
    
    .product-card {

    .product-card:active {

    <!-- Home Screen -->

        <div class="container">
            <div class="category-card" onclick="showBrands('COOLER')">
                <div class="category-card-image">❄️</div>
                <div class="category-card-title">COOLER</div>

            <div class="category-card" onclick="showBrands('FAN')">

    <!-- Brands Screen -->
    <div class="screen hidden" id="brandsScreen">
        <div class="container">

        </div>
    </div>
    
    <!-- Products Screen -->
    <div class="screen hidden" id="productsScreen">

                <div class="add-icon">+</div>

<!-- Add Brand Modal -->
<div class="modal" id="addBrandModal" onclick="closeModal(event, 'addBrandModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">Add New Brand</div>
        <div class="form-group">
            <label class="form-label">Brand Name</label>
            <input type="text" class="form-input" id="brandNameInput" placeholder="Enter brand name">
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeModal(null, 'addBrandModal')">Cancel</button>
            <button class="btn btn-primary" onclick="addBrand()">Add Brand</button>

<div class="modal" id="addProductModal" onclick="closeModal(event, 'addProductModal')">

        <div class="modal-header">Add New Product</div>
        <div class="form-group">
            <label class="form-label">Product Photo</label>
            <div class="file-input-wrapper">
                <input type="file" class="file-input" id="productImageInput" accept="image/*" onchange="previewImage(event)">

                    <span style="font-size: 24px;">📷</span>
                    <span>Tap to upload photo</span>

<!-- Image Viewer Modal -->
<div class="image-modal" id="imageModal" onclick="closeImageModal()">
    <button class="image-modal-close" onclick="closeImageModal()">×</button>
    <img class="image-modal-content" id="imageModalContent" alt="Product Image">
    <div class="image-modal-title" id="imageModalTitle"></div>
</div>

<script>
    // App State
    let appState = {
        currentScreen: 'home',
        currentCategory: null,
        currentBrand: null,
        data: {
            COOLER: {},
            FAN: {}
        }
    };
    
    // Navigation
    const screens = {
        home: document.getElementById('homeScreen'),
        brands: document.getElementById('brandsScreen'),
        products: document.getElementById('productsScreen')
    };
    
    function showScreen(screenName) {
        Object.values(screens).forEach(screen => screen.classList.add('hidden'));
        screens[screenName].classList.remove('hidden');
        appState.currentScreen = screenName;
        
        const backBtn = document.getElementById('backBtn');
        const headerTitle = document.getElementById('headerTitle');
        
        if (screenName === 'home') {
            backBtn.classList.add('hidden');
            headerTitle.textContent = 'Product Catalogue';
        } else {
            backBtn.classList.remove('hidden');
            if (screenName === 'brands') {
                headerTitle.textContent = appState.currentCategory;
            } else if (screenName === 'products') {
                headerTitle.textContent = appState.currentBrand;
            }
        }
    }
    
    function goBack() {
        if (appState.currentScreen === 'products') {
            showBrands(appState.currentCategory);
        } else if (appState.currentScreen === 'brands') {
            showScreen('home');
        }
    }
    
    // Brands
    function showBrands(category) {
        appState.currentCategory = category;
        const brandsList = document.getElementById('brandsList');
        brandsList.innerHTML = '';
        
        const brands = Object.keys(appState.data[category]);
        
        brands.forEach(brand => {
            const brandCard = document.createElement('div');
            brandCard.className = 'brand-card';
            brandCard.onclick = () => showProducts(category, brand);
            brandCard.innerHTML = `<div class="brand-name">${brand}</div>`;
            brandsList.appendChild(brandCard);
        });
        
        // Add Brand Card
        const addCard = document.createElement('div');
        addCard.className = 'add-card';
        addCard.onclick = showAddBrandModal;
        addCard.innerHTML = `
            <div class="add-icon">+</div>
            <div class="add-text">Add Brand</div>
        `;
        brandsList.appendChild(addCard);
        
        showScreen('brands');
    }
    
    function showAddBrandModal() {
        document.getElementById('brandNameInput').value = '';
        document.getElementById('addBrandModal').classList.add('active');
    }
    
    function addBrand() {
        const brandName = document.getElementById('brandNameInput').value.trim();
        if (!brandName) {
            alert('Please enter a brand name');
            return;
        }
        
        if (!appState.data[appState.currentCategory][brandName]) {
            appState.data[appState.currentCategory][brandName] = [];
            saveData();
            showBrands(appState.currentCategory);
            closeModal(null, 'addBrandModal');
        } else {
            alert('Brand already exists');
        }
    }
    
    // Products
    function showProducts(category, brand) {
        appState.currentCategory = category;
        appState.currentBrand = brand;
        const productsList = document.getElementById('productsList');
        productsList.innerHTML = '';
        
        const products = appState.data[category][brand] || [];
        
        products.forEach(product => {
            const productCard = document.createElement('div');
            productCard.className = 'product-card';
            productCard.onclick = () => openImageModal(product);
            
            const imageHtml = product.image 
                ? `<img src="${product.image}" alt="${product.name}" class="product-image">`
                : `<div class="product-placeholder">📦</div>`;
            
            productCard.innerHTML = `
                <div class="product-image-container">
                    ${imageHtml}
                </div>
                <div class="product-name">${product.name}</div>
            `;
            productsList.appendChild(productCard);
        });
        
        if (products.length === 0) {
            const emptyState = document.createElement('div');
            emptyState.className = 'empty-state';
            emptyState.style.gridColumn = '1 / -1';
            emptyState.innerHTML = `
                <div class="empty-icon">📦</div>
                <div class="empty-text">No products yet<br>Tap "Add Product" to get started</div>
            `;
            productsList.appendChild(emptyState);
        }
        
        showScreen('products');
    }
    
    function openImageModal(product) {
        if (product.image) {
            document.getElementById('imageModalContent').src = product.image;
            document.getElementById('imageModalTitle').textContent = product.name;
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    }
    
    function closeImageModal() {
        document.getElementById('imageModal').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function showAddProductModal() {
        document.getElementById('productNameInput').value = '';
        document.getElementById('productImageInput').value = '';
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('addProductModal').classList.add('active');
    }
    
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
    }
    
    function addProduct() {
        const productName = document.getElementById('productNameInput').value.trim();
        const imageInput = document.getElementById('productImageInput');
        
        if (!productName) {
            alert('Please enter a model name');
            return;
        }
        
        if (imageInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const product = {
                    name: productName,
                    image: e.target.result
                };
                
                if (!appState.data[appState.currentCategory][appState.currentBrand]) {
                    appState.data[appState.currentCategory][appState.currentBrand] = [];
                }
                
                appState.data[appState.currentCategory][appState.currentBrand].push(product);
                saveData();
                showProducts(appState.currentCategory, appState.currentBrand);
                closeModal(null, 'addProductModal');
            };
            reader.readAsDataURL(imageInput.files[0]);
        } else {
            const product = {
                name: productName,
                image: null
            };
            
            if (!appState.data[appState.currentCategory][appState.currentBrand]) {
                appState.data[appState.currentCategory][appState.currentBrand] = [];
            }
            
            appState.data[appState.currentCategory][appState.currentBrand].push(product);
            saveData();
            showProducts(appState.currentCategory, appState.currentBrand);
            closeModal(null, 'addProductModal');
        }
    }
    
    // Modal
    function closeModal(event, modalId) {
        if (event) event.stopPropagation();
        document.getElementById(modalId).classList.remove('active');
    }
    
    // Data Persistence
    function saveData() {
        try {
            localStorage.setItem('catalogData', JSON.stringify(appState.data));
        } catch (e) {
            console.error('Error saving data:', e);
        }
    }
    
    function loadData() {
        try {
            const saved = localStorage.getItem('catalogData');
            if (saved) {
                appState.data = JSON.parse(saved);
            }
        } catch (e) {
            console.error('Error loading data:', e);
        }
    }
    
    // Initialize
    loadData();
    
    // Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
            self.addEventListener('install', (e) => {
                e.waitUntil(
                    caches.open('catalog-v1').then((cache) => {
                        return cache.addAll(['/']);
                    })
                );
            });
            
            self.addEventListener('fetch', (e) => {
                e.respondWith(
                    caches.match(e.request).then((response) => {
                        return response || fetch(e.request);
                    })
                );
            });
        `)).catch(() => {});
    }
</script>
