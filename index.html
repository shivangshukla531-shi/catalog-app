    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    
    :root {
        --bg-primary: #fafafa;
        --bg-card: #ffffff;
        --text-primary: #0a0a0a;
        --text-secondary: #6b6b6b;
        --border-color: #e8e8e8;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
        --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
        --accent: #0a0a0a;
        --radius: 16px;
        --spacing: 20px;
    }
    
    body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.5;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }
    
    .app {
        min-height: 100vh;
        padding-bottom: 40px;
    }
    
    .save-button {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #34C759;
        color: white;
        border: none;
        padding: 16px 32px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(52, 199, 89, 0.4);
        z-index: 100;
        transition: all 0.3s;
        display: none;
        align-items: center;
        gap: 8px;
        font-family: inherit;
    }
    
    .save-button.show {
        display: flex;
    }
    
    .save-button:active {
        transform: translateX(-50%) scale(0.95);
    }
    
    .save-button.saving {
        background: #FF9500;
        pointer-events: none;
    }
    
    .save-button.saved {
        background: #007AFF;
        animation: pulse 0.5s;
    }
    
    @keyframes pulse {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.05); }
    }
    
    .unsaved-indicator {
        position: fixed;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 149, 0, 0.9);
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        z-index: 200;
        display: none;
        align-items: center;
        gap: 6px;
        backdrop-filter: blur(10px);
    }
    
    .unsaved-indicator.show {
        display: flex;
    }
    
    .header {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.9);
    }
    
    .header-content {
        padding: 16px var(--spacing);
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .back-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
        margin: -8px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        transition: transform 0.2s;
    }
    
    .back-btn:active {
        transform: scale(0.9);
    }
    
    .header-title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
        flex: 1;
    }
    
    .header-menu-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
        margin: -8px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        transition: transform 0.2s;
    }
    
    .header-menu-btn:active {
        transform: scale(0.9);
    }
    
    .container {
        padding: var(--spacing);
    }
    
    .category-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        margin-bottom: 20px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }
    
    .category-card:active {
        transform: scale(0.98);
        box-shadow: var(--shadow-sm);
    }
    
    .category-card-image {
        width: 100%;
        height: 200px;
        background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 72px;
        position: relative;
        overflow: hidden;
    }
    
    .category-card-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3) 0%, transparent 60%);
    }
    
    .category-card-title {
        padding: 24px;
        font-size: 24px;
        font-weight: 600;
        text-align: center;
        letter-spacing: -0.02em;
    }
    
    .brand-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
    }
    
    .brand-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 32px 24px;
        box-shadow: var(--shadow-md);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        border: 2px solid transparent;
    }
    
    .brand-card:active {
        transform: translateY(2px);
        box-shadow: var(--shadow-sm);
    }
    
    .brand-name {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
    }
    
    .add-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 32px 24px;
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        border: 2px dashed var(--border-color);
        color: var(--text-secondary);
    }
    
    .add-card:active {
        transform: scale(0.98);
        border-color: var(--accent);
        color: var(--accent);
    }
    
    .add-icon {
        font-size: 32px;
        margin-bottom: 8px;
    }
    
    .add-text {
        font-size: 16px;
        font-weight: 500;
    }
    
    .product-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 100px;
    }
    
    .product-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        user-select: none;
    }
    
    .product-card:active {
        transform: scale(0.97);
    }
    
    .product-card.dragging {
        opacity: 0.5;
        transform: scale(1.05);
        z-index: 1000;
    }
    
    .product-card.drag-over {
        border: 2px dashed var(--accent);
    }
    
    .product-card.selected {
        border: 3px solid #007AFF;
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);

    .product-image-container {
        width: 100%;

        background: #f8f8f8;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    
    .product-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .product-placeholder {
        font-size: 48px;
        color: #d0d0d0;
    }
    
    .product-name {
        padding: 16px 12px;

        line-height: 1.4;
        color: var(--text-primary);

    .product-price {
        padding: 0 12px 12px 12px;
